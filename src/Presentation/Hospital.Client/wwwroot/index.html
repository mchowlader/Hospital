<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farzana's Dental Care</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css" />
    <link href="Hospital.Client.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div class="loading-container">
            <div class="loading-card">
                <div class="loading-logo-fallback">
                    <span style="font-size: 48px;">🩺</span>
                </div>
                <h2 class="loading-company-name">Farzana's Dental Care</h2>
                <div class="loading-status">Loading application...</div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none;">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">✖</span>
    </div>
    
    <script>
        window.downloadFileFromBase64 = function (filename, base64String) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = 'data:application/octet-stream;base64,' + base64String;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
